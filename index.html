<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<body class="bg-[#f5f5f7] p-5">
<form id="form" class="mx-auto max-w-5xl space-y-5">

<img id="logo" src="logo.png" class="h-12 mx-auto" alt="Logo">

<div class="mx-auto grid max-w-md grid-cols-2 rounded-2xl bg-white p-1 shadow-sm">

<button id="modeMileage" type="button" class="rounded-xl px-3 py-3 text-sm font-semibold text-slate-700">Indemnités Kilométriques</button>
</div>

<section id="expenseFields" class="mx-auto max-w-md space-y-5">

<label class="font-semibold" for="name">Prénom et NOM :</label>
<input id="name" class="w-full p-4 rounded-2xl bg-white">

<label class="font-semibold" for="payment">Mode de paiement :</label>
<select id="payment" class="w-full p-4 rounded-2xl bg-white">
<option value="" selected>Sélectionner</option>
<option>CB-Benjamin</option>
<option>CB-Armement - 5515</option>
<option>CB-Armement</option>
<option>CB-SUROIT</option>
<option>CB-LE ROZEL</option>
<option>CB-GOURY</option>
<option>CB-LANDEMER</option>
<option>CB-Perso</option>
</select>

<label class="font-semibold" for="object">Objet :</label>

<option value="" selected>Sélectionner</option>
<option>GOURY</option>
<option>LE ROZEL</option>
<option>LANDEMER</option>
<option>SUROIT</option>
<option>Yard - LE HAVRE</option>
<option>Armement - CHERBOURG</option>
</select>

<p class="text-sm">Si la facture n'est pas explicite, décrire la nature de la dépense.</p>

</section>

<section id="mileageFields" class="hidden space-y-5">
<div class="rounded-2xl bg-white p-4 shadow-sm">
<h2 class="mb-3 text-lg font-bold">Demandeur / Date</h2>
<div class="grid gap-4 md:grid-cols-3">
<label class="space-y-2 font-semibold" for="ikName"><span>Prénom et NOM</span><input id="ikName" class="w-full rounded-xl bg-[#f5f5f7] p-3 font-normal"></label>
<label class="space-y-2 font-semibold" for="ikFunction"><span>Fonction</span><input id="ikFunction" class="w-full rounded-xl bg-[#f5f5f7] p-3 font-normal"></label>
<label class="space-y-2 font-semibold" for="ikPeriod"><span>Date ou période</span><input id="ikPeriod" class="w-full rounded-xl bg-[#f5f5f7] p-3 font-normal"></label>
</div>
</div>

<div class="rounded-2xl bg-white p-4 shadow-sm">
<h2 class="mb-3 text-lg font-bold">Véhicule</h2>
<div class="grid gap-4 md:grid-cols-2">
<label class="space-y-2 font-semibold" for="vehicleModel"><span>Marque / Modèle</span><input id="vehicleModel" class="w-full rounded-xl bg-[#f5f5f7] p-3 font-normal"></label>
<label class="space-y-2 font-semibold" for="fiscalPower"><span>Puissance Fiscale</span><input id="fiscalPower" class="w-full rounded-xl bg-[#f5f5f7] p-3 font-normal"></label>
</div>

<legend class="font-semibold">Type de carburant</legend>

<label class="flex items-center gap-2 rounded-xl bg-[#f5f5f7] p-3"><input id="fuelHybrid" type="checkbox" class="h-4 w-4"> Hybride</label>
</div>

</div>

<tr class="bg-[#17677f] text-white">

<th class="border border-slate-300 p-2">Trajet (Départ → Arrivée)</th>
<th class="border border-slate-300 p-2">Motif</th>
<th class="border border-slate-300 p-2">Km parcourus</th>
<th class="border border-slate-300 p-2">Barème</th>
<th class="border border-slate-300 p-2">Montant (€)</th>
</tr>
</thead>
<tbody>
<tr><td class="border border-slate-300 p-1"><input id="mileageDate0" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRoute0" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageReason0" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageKm0" type="number" min="0" step="1" inputmode="numeric" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRate0" readonly class="w-full bg-slate-100 p-2 text-center"></td><td class="border border-slate-300 p-1"><input id="mileageAmount0" class="w-full p-2 text-right"></td></tr>
<tr><td class="border border-slate-300 p-1"><input id="mileageDate1" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRoute1" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageReason1" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageKm1" type="number" min="0" step="1" inputmode="numeric" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRate1" readonly class="w-full bg-slate-100 p-2 text-center"></td><td class="border border-slate-300 p-1"><input id="mileageAmount1" class="w-full p-2 text-right"></td></tr>
<tr><td class="border border-slate-300 p-1"><input id="mileageDate2" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRoute2" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageReason2" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageKm2" type="number" min="0" step="1" inputmode="numeric" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRate2" readonly class="w-full bg-slate-100 p-2 text-center"></td><td class="border border-slate-300 p-1"><input id="mileageAmount2" class="w-full p-2 text-right"></td></tr>
<tr><td class="border border-slate-300 p-1"><input id="mileageDate3" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRoute3" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageReason3" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageKm3" type="number" min="0" step="1" inputmode="numeric" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRate3" readonly class="w-full bg-slate-100 p-2 text-center"></td><td class="border border-slate-300 p-1"><input id="mileageAmount3" class="w-full p-2 text-right"></td></tr>
<tr><td class="border border-slate-300 p-1"><input id="mileageDate4" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRoute4" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageReason4" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageKm4" type="number" min="0" step="1" inputmode="numeric" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRate4" readonly class="w-full bg-slate-100 p-2 text-center"></td><td class="border border-slate-300 p-1"><input id="mileageAmount4" class="w-full p-2 text-right"></td></tr>
<tr><td class="border border-slate-300 p-1"><input id="mileageDate5" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRoute5" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageReason5" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageKm5" type="number" min="0" step="1" inputmode="numeric" class="w-full p-2"></td><td class="border border-slate-300 p-1"><input id="mileageRate5" readonly class="w-full bg-slate-100 p-2 text-center"></td><td class="border border-slate-300 p-1"><input id="mileageAmount5" class="w-full p-2 text-right"></td></tr>
<tr><td colspan="5" class="border border-slate-300 p-3 text-right font-bold">TOTAL</td><td class="border border-slate-300 p-1"><input id="mileageTotal" readonly class="w-full bg-slate-100 p-2 text-right font-bold"></td></tr>
</tbody>
</table>
</div>
</section>

<section class="mx-auto max-w-md space-y-3">
<label class="font-semibold" for="photos">Ajout de justificatif(s) :</label>
<input id="photos" type="file" multiple accept="image/*,application/pdf">
<div id="preview" class="grid grid-cols-3 gap-2"></div>
</section>

<button id="submit" type="submit" class="w-full py-4 rounded-2xl bg-black text-white disabled:opacity-60">Envoyer</button>
<p id="status" role="status" aria-live="polite" class="hidden rounded-2xl p-4 text-sm font-semibold"></p>
</form>

<script>
let images=[];
const form=document.getElementById('form');
const name=document.getElementById('name');
const payment=document.getElementById('payment');
const object=document.getElementById('object');
const description=document.getElementById('description');
const photos=document.getElementById('photos');
const preview=document.getElementById('preview');
const submit=document.getElementById('submit');
const status=document.getElementById('status');
const logo=document.getElementById('logo');
const formTitle=document.getElementById('formTitle');
const modeExpense=document.getElementById('modeExpense');
const modeMileage=document.getElementById('modeMileage');
const expenseFields=document.getElementById('expenseFields');
const mileageFields=document.getElementById('mileageFields');
const ikName=document.getElementById('ikName');
const ikFunction=document.getElementById('ikFunction');
const ikPeriod=document.getElementById('ikPeriod');
const vehicleModel=document.getElementById('vehicleModel');
const fiscalPower=document.getElementById('fiscalPower');
const fuelEssence=document.getElementById('fuelEssence');
const fuelDiesel=document.getElementById('fuelDiesel');
const fuelElectric=document.getElementById('fuelElectric');
const fuelHybrid=document.getElementById('fuelHybrid');
const mileageTotal=document.getElementById('mileageTotal');
const mileageRows=Array.from({length:6},(_,index)=>({
 date:document.getElementById(`mileageDate${index}`),
 route:document.getElementById(`mileageRoute${index}`),
 reason:document.getElementById(`mileageReason${index}`),
 km:document.getElementById(`mileageKm${index}`),
 rate:document.getElementById(`mileageRate${index}`),
 amount:document.getElementById(`mileageAmount${index}`)
}));
const MILEAGE_RATE=0.606;
let activeMode='expense';
const initialExpenseValues={
 name:name.value,
 payment:payment.value,
 object:object.value,
 description:description.value
};

function setStatus(message,type){
 status.textContent=message;
 status.className=`rounded-2xl p-4 text-sm font-semibold ${type==='success'?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}`;
}

function clearStatus(){
 status.textContent='';
 status.className='hidden rounded-2xl p-4 text-sm font-semibold';
}

function parseFrenchNumber(value){
 const normalized=(value||'').toString().replace(/\s/g,'').replace(',','.');
 const parsed=Number.parseFloat(normalized);
 return Number.isFinite(parsed)?parsed:0;
}

function formatMoney(value){
 return value.toFixed(2).replace('.',',');
}

function setFormMode(mode){
 activeMode=mode==='mileage'?'mileage':'expense';
 const isMileage=activeMode==='mileage';
 formTitle.textContent=isMileage?'Indemnités Kilométriques':'Note de frais';
 expenseFields.className=isMileage?'hidden':'mx-auto max-w-md space-y-5';
 mileageFields.className=isMileage?'space-y-5':'hidden space-y-5';
 modeExpense.className=isMileage
  ?'rounded-xl px-3 py-3 text-sm font-semibold text-slate-700'
  :'rounded-xl bg-black px-3 py-3 text-sm font-semibold text-white';
 modeMileage.className=isMileage
  ?'rounded-xl bg-black px-3 py-3 text-sm font-semibold text-white'
  :'rounded-xl px-3 py-3 text-sm font-semibold text-slate-700';
 updateMileageCalculations();
}

function updateMileageCalculations(){
 const isElectric=!!fuelElectric.checked;
 let total=0;

 mileageRows.forEach(row=>{
  row.rate.value=isElectric?'-':'0,606';
  row.amount.readOnly=!isElectric;

  if(isElectric){
   const manualAmount=parseFrenchNumber(row.amount.value);
   if(manualAmount>0){
    total+=manualAmount;
   }
   return;
  }

  const km=Math.max(0,Number.parseInt(row.km.value,10)||0);
  if(km>0){
   const amount=Math.min(km*MILEAGE_RATE,100);
   row.amount.value=formatMoney(amount);
   total+=amount;
  }else{
   row.amount.value='';
  }
 });

 mileageTotal.value=total>0?formatMoney(total):'';
}

function clearMileageAmounts(){
 mileageRows.forEach(row=>{
  row.amount.value='';
 });
 mileageTotal.value='';
}

function readBlobAsBase64(blob){
 return new Promise((resolve,reject)=>{
  const r=new FileReader();
  r.onloadend=()=>resolve(r.result.split(',')[1]);
  r.onerror=()=>reject(new Error('Lecture du PDF impossible.'));
  r.readAsDataURL(blob);
 });
}

function readFileAsDataUrl(file){
 return new Promise((resolve,reject)=>{
  const r=new FileReader();
  r.onload=x=>resolve(x.target.result);
  r.onerror=()=>reject(new Error("Lecture de l'image impossible."));
  r.readAsDataURL(file);
 });
}

function getJpegDataView(src){
 const jpegPrefix=src.match(/^data:image\/jpeg[^,]*,/i);
 if(!jpegPrefix||typeof atob!=='function'){
  return null;
 }

 try{
  const binary=atob(src.slice(jpegPrefix[0].length));
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i+=1){
   bytes[i]=binary.charCodeAt(i);
  }
  return new DataView(bytes.buffer);
 }catch(error){
  return null;
 }
}

function getExifOrientation(src){
 const view=getJpegDataView(src);
 if(!view){
  return 1;
 }

 try{
  if(view.byteLength<4||view.getUint16(0,false)!==0xffd8){
   return 1;
  }

  let offset=2;
  while(offset+4<view.byteLength){
   if(view.getUint8(offset)!==0xff){
    break;
   }
   const marker=view.getUint8(offset+1);
   const length=view.getUint16(offset+2,false);
   if(marker===0xe1&&offset+4+length<=view.byteLength){
    const exifStart=offset+4;
    const isExif=String.fromCharCode(
     view.getUint8(exifStart),
     view.getUint8(exifStart+1),
     view.getUint8(exifStart+2),
     view.getUint8(exifStart+3)
    )==='Exif';
    if(!isExif){
     return 1;
    }

    const tiffStart=exifStart+6;
    const endian=view.getUint16(tiffStart,false);
    const little=endian===0x4949;
    if(!little&&endian!==0x4d4d){
     return 1;
    }
    if(view.getUint16(tiffStart+2,little)!==0x002a){
     return 1;
    }

    const ifdStart=tiffStart+view.getUint32(tiffStart+4,little);
    const entries=view.getUint16(ifdStart,little);
    for(let i=0;i<entries;i+=1){
     const entry=ifdStart+2+i*12;
     if(entry+12>view.byteLength){
      break;
     }
     if(view.getUint16(entry,little)===0x0112){
      return view.getUint16(entry+8,little);
     }
    }
   }
   offset+=2+length;
  }
 }catch(error){
  return 1;
 }

 return 1;
}

function getJpegDimensions(src){
 const view=getJpegDataView(src);
 if(!view){
  return {width:0,height:0};
 }

 try{
  if(view.byteLength<4||view.getUint16(0,false)!==0xffd8){
   return {width:0,height:0};
  }

  let offset=2;
  while(offset+9<view.byteLength){
   if(view.getUint8(offset)!==0xff){
    break;
   }
   const marker=view.getUint8(offset+1);
   const length=view.getUint16(offset+2,false);
   const isStartOfFrame=(marker>=0xc0&&marker<=0xcf)&&![0xc4,0xc8,0xcc].includes(marker);
   if(isStartOfFrame){
    return {
     height:view.getUint16(offset+5,false),
     width:view.getUint16(offset+7,false)
    };
   }
   offset+=2+length;
  }
 }catch(error){
  return {width:0,height:0};
 }

 return {width:0,height:0};
}

function loadImage(src){
 return new Promise((resolve,reject)=>{
  const image=new Image();
  image.onload=()=>resolve(image);
  image.onerror=()=>reject(new Error("Lecture de l'image impossible."));
  image.src=src;
 });
}

function getOrientedCanvasSize(width,height,orientation){
 const rotates=orientation>=5&&orientation<=8;
 return {
  width:rotates?height:width,
  height:rotates?width:height
 };
}

function applyExifTransform(ctx,width,height,orientation){
 if(orientation===2){
  ctx.transform(-1,0,0,1,width,0);
 }else if(orientation===3){
  ctx.transform(-1,0,0,-1,width,height);
 }else if(orientation===4){
  ctx.transform(1,0,0,-1,0,height);
 }else if(orientation===5){
  ctx.transform(0,1,1,0,0,0);
 }else if(orientation===6){
  ctx.transform(0,1,-1,0,height,0);
 }else if(orientation===7){
  ctx.transform(0,-1,-1,0,height,width);
 }else if(orientation===8){
  ctx.transform(0,-1,1,0,0,width);
 }
}

async function normalizeImageBitmapForPdf(file){
 if(typeof createImageBitmap!=='function'){
  throw new Error('createImageBitmap indisponible.');
 }
 const bitmap=await createImageBitmap(file,{imageOrientation:'from-image'});
 const canvas=document.createElement('canvas');
 canvas.width=bitmap.width;
 canvas.height=bitmap.height;
 const ctx=canvas.getContext('2d');
 ctx.drawImage(bitmap,0,0);
 if(typeof bitmap.close==='function'){
  bitmap.close();
 }
 return canvas.toDataURL('image/jpeg',0.92);
}

async function normalizeDataUrlOrientation(src,orientation,metadata={}){
 const image=await loadImage(src);
 const width=image.naturalWidth||image.width;
 const height=image.naturalHeight||image.height;
 const browserAlreadyRotated=orientation>=5&&orientation<=8
  && metadata.width===height
  && metadata.height===width;
 const appliedOrientation=browserAlreadyRotated?1:orientation;
 const size=getOrientedCanvasSize(width,height,appliedOrientation);
 const canvas=document.createElement('canvas');
 canvas.width=size.width;
 canvas.height=size.height;
 const ctx=canvas.getContext('2d');
 applyExifTransform(ctx,width,height,appliedOrientation);
 ctx.drawImage(image,0,0,width,height);
 return canvas.toDataURL('image/jpeg',0.92);
}

function isPdfFile(file){
 return file.type==='application/pdf'||/\.pdf$/i.test(file.name||'');
}

async function readPdfForPdf(file){
 return {
  type:'pdf',
  dataUrl:await readFileAsDataUrl(file),
  name:file.name||'Justificatif PDF'
 };
}

async function readPhotoForPdf(file){
 const src=await readFileAsDataUrl(file);
 const orientation=getExifOrientation(src);
 const dimensions=getJpegDimensions(src);
 if(orientation===1){
  return {
   type:'image',
   dataUrl:src,
   name:file.name||'Justificatif photo'
  };
 }

 let dataUrl;
 try{
  dataUrl=await normalizeImageBitmapForPdf(file);
 }catch(error){
  dataUrl=await normalizeDataUrlOrientation(src,orientation,dimensions);
 }
 return {
  type:'image',
  dataUrl,
  name:file.name||'Justificatif photo'
 };
}

async function readReceiptForPdf(file){
 if(isPdfFile(file)){
  return readPdfForPdf(file);
 }
 return readPhotoForPdf(file);
}

modeExpense.onclick=()=>setFormMode('expense');
modeMileage.onclick=()=>setFormMode('mileage');
fuelElectric.onchange=()=>{
 if(fuelElectric.checked){
  clearMileageAmounts();
 }
 updateMileageCalculations();
};
[fuelEssence,fuelDiesel,fuelHybrid].forEach(input=>{
 input.onchange=updateMileageCalculations;
});
mileageRows.forEach(row=>{
 row.km.oninput=updateMileageCalculations;
 row.amount.oninput=updateMileageCalculations;
});
setFormMode('expense');

photos.onchange=async e=>{
 clearStatus();
 try{
  const nextImages=await Promise.all([...e.target.files].map(readReceiptForPdf));
  images.push(...nextImages);
  render();
 }catch(error){
  setStatus(error.message||"Lecture du justificatif impossible.",'error');
 }
};

function render(){
 preview.innerHTML='';
 images.forEach((receipt,idx)=>{
  if(receipt.type==='pdf'){
   preview.innerHTML+=`<div class="relative flex h-24 flex-col items-center justify-center rounded-xl bg-white p-2 text-center text-xs font-semibold text-[#001f54]"><span class="text-lg">PDF</span><span class="max-w-full truncate">${escapeHtml(receipt.name)}</span><button type="button" onclick="del(${idx})" class="absolute top-1 right-1 bg-white px-1">x</button></div>`;
   return;
  }
  preview.innerHTML+=`<div class="relative"><img src="${receipt.dataUrl}" class="h-24 w-full object-cover rounded-xl" alt="Facture ${idx+1}"><button type="button" onclick="del(${idx})" class="absolute top-1 right-1 bg-white px-1">x</button></div>`;
 });
}

function del(i){ images.splice(i,1); render(); }

function escapeHtml(value){
 return (value||'').toString()
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;')
  .replace(/'/g,'&#39;');
}

function setNavy(doc){
 doc.setTextColor(0,31,84);
}

function setBlue(doc){
 doc.setTextColor(0,96,200);
}

function pdfText(value){
 return (value||'').toString().normalize('NFD').replace(/[\u0300-\u036f]+/g,'');
}

function hasExpenseSummaryChanges(){
 return name.value!==initialExpenseValues.name
  || payment.value!==initialExpenseValues.payment
  || object.value!==initialExpenseValues.object
  || description.value!==initialExpenseValues.description;
}

async function loadImageDimensions(src){
 const image=await loadImage(src);
 return {
  width:image.naturalWidth||image.width,
  height:image.naturalHeight||image.height
 };
}

async function getReceiptImagePlacement(src,pageW,pageH){
 const dimensions=await loadImageDimensions(src);
 const pxToMm=25.4/96;
 let width=dimensions.width*pxToMm;
 let height=dimensions.height*pxToMm;
 const scale=Math.min(1,pageW/width,pageH/height);
 width*=scale;
 height*=scale;

 return {
  x:(pageW-width)/2,
  y:(pageH-height)/2,
  width,
  height
 };
}

function dataUrlToBlob(src,fallbackType='application/pdf'){
 const parts=src.split(',');
 const header=parts[0]||'';
 const data=parts[1]||'';
 const mime=header.match(/^data:([^;,]+)/)?.[1]||fallbackType;
 const binary=atob(data);
 const bytes=new Uint8Array(binary.length);
 for(let i=0;i<binary.length;i+=1){
  bytes[i]=binary.charCodeAt(i);
 }
 return new Blob([bytes],{type:mime});
}

function getImageFormat(src){
 const mime=src.match(/^data:image\/([^;,]+)/i)?.[1]?.toUpperCase()||'JPEG';
 if(mime==='JPG'){
  return 'JPEG';
 }
 return mime;
}

async function createReceiptPdfBlobs(){
 const blobs=[];
 for(const receipt of images){
  if(receipt.type==='pdf'){
   blobs.push(dataUrlToBlob(receipt.dataUrl,'application/pdf'));
  }else{
   blobs.push(await createImagePdfBlob(receipt.dataUrl));
  }
 }
 return blobs;
}

async function mergePdfBlobs(blobs){
 if(blobs.length===1){
  return blobs[0];
 }
 const PDFDocument=window.PDFLib?.PDFDocument;
 if(!PDFDocument){
  throw new Error('Fusion PDF indisponible.');
 }
 const merged=await PDFDocument.create();
 for(const blob of blobs){
  const source=await PDFDocument.load(await blob.arrayBuffer());
  const copiedPages=await merged.copyPages(source,source.getPageIndices());
  copiedPages.forEach(page=>merged.addPage(page));
 }
 const mergedBytes=await merged.save();
 return new Blob([mergedBytes],{type:'application/pdf'});
}

async function genPDF(){
 const blobs=await createReceiptPdfBlobs();
 if(activeMode==='mileage'){
  blobs.push(await createMileagePdfBlob());
 }else if(hasExpenseSummaryChanges()){
  blobs.push(await createSummaryPdfBlob());
 }
 if(!blobs.length){
  const {jsPDF}=window.jspdf;
  return new jsPDF().output('blob');
 }
 return mergePdfBlobs(blobs);
}

form.onsubmit=async(e)=>{
 e.preventDefault();
 clearStatus();
 submit.disabled=true;
 submit.textContent='Envoi en cours...';

 try{
  const blob=await genPDF();
  const base64=await readBlobAsBase64(blob);
  const response=await fetch('/.netlify/functions/send',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({pdfBase64:base64,name:(activeMode==='mileage'?ikName.value:name.value)||''})
  });
  const result=await response.json().catch(()=>({ok:false,error:"Réponse d'envoi invalide."}));

  if(!response.ok||!result.ok){
   throw new Error(result.error||"Échec de l'envoi du PDF.");
  }

  form.reset();
  images=[];
  photos.value='';
  render();
  updateMileageCalculations();
  setStatus('PDF envoyé avec succès. Vous pouvez saisir une nouvelle note de frais.','success');
 }catch(error){
  setStatus(error.message||"Échec de l'envoi du PDF.",'error');
 }finally{
  submit.disabled=false;
  submit.textContent='Envoyer';
 }
};
