<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Note de frais</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body class="bg-[#f5f5f7] p-5">
<form id="form" class="max-w-md mx-auto space-y-5">

<img id="logo" src="logo.png" class="h-12 mx-auto" alt="Logo">
<h1 class="text-3xl font-bold">Note de frais</h1>

<label class="font-semibold" for="name">Prénom et NOM :</label>
<input id="name" class="w-full p-4 rounded-2xl bg-white">

<label class="font-semibold" for="payment">Mode de paiement :</label>
<select id="payment" class="w-full p-4 rounded-2xl bg-white">
<option value="" selected>Sélectionner</option>
<option>CB-Benjamin</option>
<option>CB-Armement - 5515</option>
<option>CB-Armement</option>
<option>CB-SUROIT</option>
<option>CB-LE ROZEL</option>
<option>CB-GOURY</option>
<option>CB-LANDEMER</option>
<option>CB-Perso</option>
</select>

<label class="font-semibold" for="object">Objet :</label>
<select id="object" class="w-full p-4 rounded-2xl bg-white">
<option value="" selected>Sélectionner</option>
<option>GOURY</option>
<option>LE ROZEL</option>
<option>LANDEMER</option>
<option>SUROIT</option>
<option>Yard - LE HAVRE</option>
<option>Armement - CHERBOURG</option>
</select>

<p class="text-sm">Si la facture n'est pas explicite, décrire la nature de la dépense.</p>
<textarea id="description" class="w-full p-4 rounded-2xl bg-white"></textarea>

<label class="font-semibold" for="photos">Ajout de justificatif(s) :</label>
<input id="photos" type="file" multiple accept="image/*,application/pdf">
<div id="preview" class="grid grid-cols-3 gap-2"></div>

<button id="submit" type="submit" class="w-full py-4 rounded-2xl bg-black text-white disabled:opacity-60">Envoyer</button>
<p id="status" role="status" aria-live="polite" class="hidden rounded-2xl p-4 text-sm font-semibold"></p>
</form>

<script>
let images=[];
const form=document.getElementById('form');
const name=document.getElementById('name');
const payment=document.getElementById('payment');
const object=document.getElementById('object');
const description=document.getElementById('description');
const photos=document.getElementById('photos');
const preview=document.getElementById('preview');
const submit=document.getElementById('submit');
const status=document.getElementById('status');
const logo=document.getElementById('logo');
const initialExpenseValues={
 name:name.value,
 payment:payment.value,
 object:object.value,
 description:description.value
};

function setStatus(message,type){
 status.textContent=message;
 status.className=`rounded-2xl p-4 text-sm font-semibold ${type==='success'?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}`;
}

function clearStatus(){
 status.textContent='';
 status.className='hidden rounded-2xl p-4 text-sm font-semibold';
}

function readBlobAsBase64(blob){
 return new Promise((resolve,reject)=>{
  const r=new FileReader();
  r.onloadend=()=>resolve(r.result.split(',')[1]);
  r.onerror=()=>reject(new Error('Lecture du PDF impossible.'));
  r.readAsDataURL(blob);
 });
}

function readFileAsDataUrl(file){
 return new Promise((resolve,reject)=>{
  const r=new FileReader();
  r.onload=x=>resolve(x.target.result);
  r.onerror=()=>reject(new Error("Lecture de l'image impossible."));
  r.readAsDataURL(file);
 });
}

function getJpegDataView(src){
 const jpegPrefix=src.match(/^data:image\/jpeg[^,]*,/i);
 if(!jpegPrefix||typeof atob!=='function'){
  return null;
 }

 try{
  const binary=atob(src.slice(jpegPrefix[0].length));
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i+=1){
   bytes[i]=binary.charCodeAt(i);
  }
  return new DataView(bytes.buffer);
 }catch(error){
  return null;
 }
}

function getExifOrientation(src){
 const view=getJpegDataView(src);
 if(!view){
  return 1;
 }

 try{
  if(view.byteLength<4||view.getUint16(0,false)!==0xffd8){
   return 1;
  }

  let offset=2;
  while(offset+4<view.byteLength){
   if(view.getUint8(offset)!==0xff){
    break;
   }
   const marker=view.getUint8(offset+1);
   const length=view.getUint16(offset+2,false);
   if(marker===0xe1&&offset+4+length<=view.byteLength){
    const exifStart=offset+4;
    const isExif=String.fromCharCode(
     view.getUint8(exifStart),
     view.getUint8(exifStart+1),
     view.getUint8(exifStart+2),
     view.getUint8(exifStart+3)
    )==='Exif';
    if(!isExif){
     return 1;
    }

    const tiffStart=exifStart+6;
    const endian=view.getUint16(tiffStart,false);
    const little=endian===0x4949;
    if(!little&&endian!==0x4d4d){
     return 1;
    }
    if(view.getUint16(tiffStart+2,little)!==0x002a){
     return 1;
    }

    const ifdStart=tiffStart+view.getUint32(tiffStart+4,little);
    const entries=view.getUint16(ifdStart,little);
    for(let i=0;i<entries;i+=1){
     const entry=ifdStart+2+i*12;
     if(entry+12>view.byteLength){
      break;
     }
     if(view.getUint16(entry,little)===0x0112){
      return view.getUint16(entry+8,little);
     }
    }
   }
   offset+=2+length;
  }
 }catch(error){
  return 1;
 }

 return 1;
}

function getJpegDimensions(src){
 const view=getJpegDataView(src);
 if(!view){
  return {width:0,height:0};
 }

 try{
  if(view.byteLength<4||view.getUint16(0,false)!==0xffd8){
   return {width:0,height:0};
  }

  let offset=2;
  while(offset+9<view.byteLength){
   if(view.getUint8(offset)!==0xff){
    break;
   }
   const marker=view.getUint8(offset+1);
   const length=view.getUint16(offset+2,false);
   const isStartOfFrame=(marker>=0xc0&&marker<=0xcf)&&![0xc4,0xc8,0xcc].includes(marker);
   if(isStartOfFrame){
    return {
     height:view.getUint16(offset+5,false),
     width:view.getUint16(offset+7,false)
    };
   }
   offset+=2+length;
  }
 }catch(error){
  return {width:0,height:0};
 }

 return {width:0,height:0};
}

function loadImage(src){
 return new Promise((resolve,reject)=>{
  const image=new Image();
  image.onload=()=>resolve(image);
  image.onerror=()=>reject(new Error("Lecture de l'image impossible."));
  image.src=src;
 });
}

function getOrientedCanvasSize(width,height,orientation){
 const rotates=orientation>=5&&orientation<=8;
 return {
  width:rotates?height:width,
  height:rotates?width:height
 };
}

function applyExifTransform(ctx,width,height,orientation){
 if(orientation===2){
  ctx.transform(-1,0,0,1,width,0);
 }else if(orientation===3){
  ctx.transform(-1,0,0,-1,width,height);
 }else if(orientation===4){
  ctx.transform(1,0,0,-1,0,height);
 }else if(orientation===5){
  ctx.transform(0,1,1,0,0,0);
 }else if(orientation===6){
  ctx.transform(0,1,-1,0,height,0);
 }else if(orientation===7){
  ctx.transform(0,-1,-1,0,height,width);
 }else if(orientation===8){
  ctx.transform(0,-1,1,0,0,width);
 }
}

async function normalizeImageBitmapForPdf(file){
 if(typeof createImageBitmap!=='function'){
  throw new Error('createImageBitmap indisponible.');
 }
 const bitmap=await createImageBitmap(file,{imageOrientation:'from-image'});
 const canvas=document.createElement('canvas');
 canvas.width=bitmap.width;
 canvas.height=bitmap.height;
 const ctx=canvas.getContext('2d');
 ctx.drawImage(bitmap,0,0);
 if(typeof bitmap.close==='function'){
  bitmap.close();
 }
 return canvas.toDataURL('image/jpeg',0.92);
}

async function normalizeDataUrlOrientation(src,orientation,metadata={}){
 const image=await loadImage(src);
 const width=image.naturalWidth||image.width;
 const height=image.naturalHeight||image.height;
 const browserAlreadyRotated=orientation>=5&&orientation<=8
  && metadata.width===height
  && metadata.height===width;
 const appliedOrientation=browserAlreadyRotated?1:orientation;
 const size=getOrientedCanvasSize(width,height,appliedOrientation);
 const canvas=document.createElement('canvas');
 canvas.width=size.width;
 canvas.height=size.height;
 const ctx=canvas.getContext('2d');
 applyExifTransform(ctx,width,height,appliedOrientation);
 ctx.drawImage(image,0,0,width,height);
 return canvas.toDataURL('image/jpeg',0.92);
}

function isPdfFile(file){
 return file.type==='application/pdf'||/\.pdf$/i.test(file.name||'');
}

async function readPdfForPdf(file){
 return {
  type:'pdf',
  dataUrl:await readFileAsDataUrl(file),
  name:file.name||'Justificatif PDF'
 };
}

async function readPhotoForPdf(file){
 const src=await readFileAsDataUrl(file);
 const orientation=getExifOrientation(src);
 const dimensions=getJpegDimensions(src);
 if(orientation===1){
  return {
   type:'image',
   dataUrl:src,
   name:file.name||'Justificatif photo'
  };
 }

 let dataUrl;
 try{
  dataUrl=await normalizeImageBitmapForPdf(file);
 }catch(error){
  dataUrl=await normalizeDataUrlOrientation(src,orientation,dimensions);
 }
 return {
  type:'image',
  dataUrl,
  name:file.name||'Justificatif photo'
 };
}

async function readReceiptForPdf(file){
 if(isPdfFile(file)){
  return readPdfForPdf(file);
 }
 return readPhotoForPdf(file);
}

photos.onchange=async e=>{
 clearStatus();
 try{
  const nextImages=await Promise.all([...e.target.files].map(readReceiptForPdf));
  images.push(...nextImages);
  render();
 }catch(error){
  setStatus(error.message||"Lecture du justificatif impossible.",'error');
 }
};

function render(){
 preview.innerHTML='';
 images.forEach((receipt,idx)=>{
  if(receipt.type==='pdf'){
   preview.innerHTML+=`<div class="relative flex h-24 flex-col items-center justify-center rounded-xl bg-white p-2 text-center text-xs font-semibold text-[#001f54]"><span class="text-lg">PDF</span><span class="max-w-full truncate">${escapeHtml(receipt.name)}</span><button type="button" onclick="del(${idx})" class="absolute top-1 right-1 bg-white px-1">x</button></div>`;
   return;
  }
  preview.innerHTML+=`<div class="relative"><img src="${receipt.dataUrl}" class="h-24 w-full object-cover rounded-xl" alt="Facture ${idx+1}"><button type="button" onclick="del(${idx})" class="absolute top-1 right-1 bg-white px-1">x</button></div>`;
 });
}

function del(i){ images.splice(i,1); render(); }

function escapeHtml(value){
 return (value||'').toString()
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;')
  .replace(/'/g,'&#39;');
}

function setNavy(doc){
 doc.setTextColor(0,31,84);
}

function setBlue(doc){
 doc.setTextColor(0,96,200);
}

function pdfText(value){
 return (value||'').toString().normalize('NFD').replace(/[\u0300-\u036f]+/g,'');
}

function hasExpenseSummaryChanges(){
 return name.value!==initialExpenseValues.name
  || payment.value!==initialExpenseValues.payment
  || object.value!==initialExpenseValues.object
  || description.value!==initialExpenseValues.description;
}

async function loadImageDimensions(src){
 const image=await loadImage(src);
 return {
  width:image.naturalWidth||image.width,
  height:image.naturalHeight||image.height
 };
}

async function getReceiptImagePlacement(src,pageW,pageH){
 const dimensions=await loadImageDimensions(src);
 const pxToMm=25.4/96;
 let width=dimensions.width*pxToMm;
 let height=dimensions.height*pxToMm;
 const scale=Math.min(1,pageW/width,pageH/height);
 width*=scale;
 height*=scale;

 return {
  x:(pageW-width)/2,
  y:(pageH-height)/2,
  width,
  height
 };
}

function dataUrlToBlob(src,fallbackType='application/pdf'){
 const parts=src.split(',');
 const header=parts[0]||'';
 const data=parts[1]||'';
 const mime=header.match(/^data:([^;,]+)/)?.[1]||fallbackType;
 const binary=atob(data);
 const bytes=new Uint8Array(binary.length);
 for(let i=0;i<binary.length;i+=1){
  bytes[i]=binary.charCodeAt(i);
 }
 return new Blob([bytes],{type:mime});
}

function getImageFormat(src){
 const mime=src.match(/^data:image\/([^;,]+)/i)?.[1]?.toUpperCase()||'JPEG';
 if(mime==='JPG'){
  return 'JPEG';
 }
 return mime;
}

function drawExpenseIcon(doc,type,x,y){
 doc.setDrawColor(0,31,84);
 doc.setFillColor(0,31,84);
 doc.setLineWidth(0.8);

 if(type==='person'){
  doc.circle(x+4,y-4,2.5,'F');
  doc.roundedRect(x,y,8,5,2,2,'F');
  return;
 }

 if(type==='card'){
  doc.roundedRect(x,y-8,11,7,1,1,'F');
  doc.setDrawColor(255,255,255);
  doc.setLineWidth(0.7);
  doc.line(x+1.5,y-5.7,x+9.5,y-5.7);
  doc.line(x+2,y-2.5,x+4,y-2.5);
  doc.line(x+5,y-2.5,x+7,y-2.5);
  return;
 }

 if(type==='clipboard'){
  doc.roundedRect(x+1,y-9,9,12,1,1);
  doc.roundedRect(x+3.2,y-11,4.6,3,1,1);
  doc.line(x+3,y-4.5,x+8,y-4.5);
  doc.line(x+3,y-1.5,x+8,y-1.5);
  return;
 }

 doc.roundedRect(x+1,y-9,9,12,0.5,0.5);
 doc.line(x+7,y-9,x+10,y-6);
 doc.line(x+7,y-9,x+7,y-6);
 doc.line(x+7,y-6,x+10,y-6);
 doc.line(x+3,y-4.5,x+8,y-4.5);
 doc.line(x+3,y-1.5,x+8,y-1.5);
}

function drawExpenseRow(doc,rowY,label,value,type){
 drawExpenseIcon(doc,type,20,rowY);
 setNavy(doc);
 doc.setFont('helvetica','bold');
 doc.setFontSize(12);
 doc.text(label,42,rowY-2);

 doc.setDrawColor(170,185,210);
 doc.setLineWidth(0.35);
 doc.line(84,rowY+2,194,rowY+2);

 doc.setFont('helvetica','normal');
 doc.setFontSize(11);
 const text=pdfText(value);
 const lines=doc.splitTextToSize(text,104);
 doc.text(lines,86,rowY-2);
}

function drawExpenseSummaryPage(doc){
 const navy=[0,31,84];
 const lightLine=[165,185,220];
 const pageW=doc.internal.pageSize.getWidth();

 doc.setFillColor(255,255,255);
 doc.rect(0,0,pageW,doc.internal.pageSize.getHeight(),'F');

 if(logo.complete){
  try{ doc.addImage(logo,'PNG',16,14,25,25); }catch(error){}
 }

 doc.setFont('helvetica','bold');
 doc.setFontSize(30);
 doc.setTextColor(0,0,0);
 doc.text('BBTM',50,32);

 doc.setDrawColor(...navy);
 doc.setLineWidth(0.5);
 doc.line(132,14,132,45);

 setNavy(doc);
 doc.setFontSize(10);
 doc.text('BENJAMIN BON TRAVAUX MARITIMES',140,23);
 doc.setFont('helvetica','normal');
 doc.text('15 impasse du Pou',140,30);
 doc.text('50340 LE ROZEL',140,37);
 doc.text('France',140,44);

 doc.setFont('helvetica','bold');
 doc.setFontSize(26);
 doc.text('NOTE DE FRAIS',16,76);
 setBlue(doc);
 doc.setLineWidth(1.4);
 doc.line(16,84,37,84);

 doc.setDrawColor(...lightLine);
 doc.setLineWidth(0.35);
 doc.roundedRect(16,92,178,116,3,3);
 doc.line(80,99,80,202);

 let rowY=112;
 drawExpenseRow(doc,rowY,'Collaborateur',name.value,'person');
 rowY+=27;
 drawExpenseRow(doc,rowY,'Mode de paiement',payment.value,'card');
 rowY+=27;
 drawExpenseRow(doc,rowY,'Objet',object.value,'clipboard');
 rowY+=27;
 drawExpenseRow(doc,rowY,'Description',description.value,'document');
}

async function createSummaryPdfBlob(){
 const {jsPDF}=window.jspdf;
 const doc=new jsPDF();
 drawExpenseSummaryPage(doc);
 return doc.output('blob');
}

async function createImagePdfBlob(src){
 const {jsPDF}=window.jspdf;
 const doc=new jsPDF();
 const w=doc.internal.pageSize.getWidth();
 const h=doc.internal.pageSize.getHeight();
 const placement=await getReceiptImagePlacement(src,w,h);
 doc.addImage(src,getImageFormat(src),placement.x,placement.y,placement.width,placement.height);
 return doc.output('blob');
}

async function mergePdfBlobs(blobs){
 if(blobs.length===1){
  return blobs[0];
 }
 const PDFDocument=window.PDFLib?.PDFDocument;
 if(!PDFDocument){
  throw new Error('Fusion PDF indisponible.');
 }
 const merged=await PDFDocument.create();
 for(const blob of blobs){
  const source=await PDFDocument.load(await blob.arrayBuffer());
  const copiedPages=await merged.copyPages(source,source.getPageIndices());
  copiedPages.forEach(page=>merged.addPage(page));
 }
 const mergedBytes=await merged.save();
 return new Blob([mergedBytes],{type:'application/pdf'});
}

async function genPDF(){
 const blobs=[];
 if(hasExpenseSummaryChanges()){
  blobs.push(await createSummaryPdfBlob());
 }
 for(const receipt of images){
  if(receipt.type==='pdf'){
   blobs.push(dataUrlToBlob(receipt.dataUrl,'application/pdf'));
  }else{
   blobs.push(await createImagePdfBlob(receipt.dataUrl));
  }
 }
 if(!blobs.length){
  const {jsPDF}=window.jspdf;
  return new jsPDF().output('blob');
 }
 return mergePdfBlobs(blobs);
}

form.onsubmit=async(e)=>{
 e.preventDefault();
 clearStatus();
 submit.disabled=true;
 submit.textContent='Envoi en cours...';

 try{
  const blob=await genPDF();
  const base64=await readBlobAsBase64(blob);
  const response=await fetch('/.netlify/functions/send',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({pdfBase64:base64,name:name.value||''})
  });
  const result=await response.json().catch(()=>({ok:false,error:"Réponse d'envoi invalide."}));

  if(!response.ok||!result.ok){
   throw new Error(result.error||"Échec de l'envoi du PDF.");
  }

  form.reset();
  images=[];
  photos.value='';
  render();
  setStatus('PDF envoyé avec succès. Vous pouvez saisir une nouvelle note de frais.','success');
 }catch(error){
  setStatus(error.message||"Échec de l'envoi du PDF.",'error');
 }finally{
  submit.disabled=false;
  submit.textContent='Envoyer';
 }
};
</script>
</body>
</html>
